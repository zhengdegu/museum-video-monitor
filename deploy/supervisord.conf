[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

# ---- MySQL ----
[program:mysql]
command=/usr/sbin/mysqld --user=mysql --datadir=/var/lib/mysql
autostart=true
autorestart=true
priority=10
stdout_logfile=/var/log/supervisor/mysql.log
stderr_logfile=/var/log/supervisor/mysql-err.log

# ---- etcd ----
[program:etcd]
command=/usr/local/bin/etcd
    -advertise-client-urls=http://127.0.0.1:2379
    -listen-client-urls=http://0.0.0.0:2379
    --data-dir=/data/etcd
autostart=true
autorestart=true
priority=20
stdout_logfile=/var/log/supervisor/etcd.log
stderr_logfile=/var/log/supervisor/etcd-err.log

# ---- MinIO ----
[program:minio]
command=/usr/local/bin/minio server /data/minio --console-address ":9001"
environment=MINIO_ROOT_USER="minioadmin",MINIO_ROOT_PASSWORD="minioadmin"
autostart=true
autorestart=true
priority=20
stdout_logfile=/var/log/supervisor/minio.log
stderr_logfile=/var/log/supervisor/minio-err.log

# ---- Milvus ----
[program:milvus]
command=/usr/bin/milvus run standalone
environment=ETCD_ENDPOINTS="127.0.0.1:2379",MINIO_ADDRESS="127.0.0.1:9000"
autostart=true
autorestart=true
priority=30
startsecs=10
stdout_logfile=/var/log/supervisor/milvus.log
stderr_logfile=/var/log/supervisor/milvus-err.log

# ---- Backend (FastAPI) ----
[program:backend]
command=python3.11 -m uvicorn app.main:app --host 0.0.0.0 --port 8080
directory=/app/backend
environment=MYSQL_HOST="127.0.0.1",MYSQL_PORT="3306",MYSQL_USER="root",MYSQL_PASSWORD="root",MYSQL_DATABASE="museum_monitor",MILVUS_HOST="127.0.0.1",MILVUS_PORT="19530",MINIO_ENDPOINT="127.0.0.1:9000",MINIO_ACCESS_KEY="minioadmin",MINIO_SECRET_KEY="minioadmin"
autostart=true
autorestart=true
priority=40
startsecs=5
stdout_logfile=/var/log/supervisor/backend.log
stderr_logfile=/var/log/supervisor/backend-err.log

# ---- Nginx (Frontend) ----
[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
priority=50
stdout_logfile=/var/log/supervisor/nginx.log
stderr_logfile=/var/log/supervisor/nginx-err.log
