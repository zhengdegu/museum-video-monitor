services:
  mysql:
    image: mysql:8.0
    container_name: museum-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root123}
      MYSQL_DATABASE: museum_monitor
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: museum-milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: museum-milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus_minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.4.4
    container_name: museum-milvus
    depends_on:
      - milvus-etcd
      - milvus-minio
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: museum-mediamtx
    ports:
      - "8554:8554"   # RTSP
      - "8888:8888"   # WebRTC
      - "8889:8889"   # HLS
      # 9997 API 端口仅内部网络使用，不暴露到宿主机
    volumes:
      - ./deploy/mediamtx.yml:/mediamtx.yml

  minio:
    image: minio/minio:latest
    container_name: museum-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  backend:
    build: ./backend
    container_name: museum-backend
    depends_on:
      mysql:
        condition: service_healthy
      milvus:
        condition: service_healthy
      mediamtx:
        condition: service_started
      minio:
        condition: service_started
    environment:
      SECRET_KEY: ${SECRET_KEY:-museum-monitor-secret-2026}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root123}
      MYSQL_DATABASE: museum_monitor
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      # Milvus
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      # MediaMTX
      MEDIAMTX_API_URL: http://mediamtx:9997
      MEDIAMTX_RTSP_URL: rtsp://mediamtx:8554
      # 大模型 API（从 .env 读取）
      VLLM_TEXT_URL: ${VLLM_TEXT_URL:-https://api.openai.com/v1}
      VLLM_VISION_URL: ${VLLM_VISION_URL:-https://api.openai.com/v1}
      VLLM_TEXT_MODEL: ${VLLM_TEXT_MODEL:-gpt-4o}
      VLLM_VISION_MODEL: ${VLLM_VISION_MODEL:-gpt-4o}
      VLLM_API_KEY: ${VLLM_API_KEY:-not-needed}
      VLLM_VISION_API_KEY: ${VLLM_VISION_API_KEY:-}
      # 报警
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      ALERT_WEBHOOK_TYPE: ${ALERT_WEBHOOK_TYPE:-feishu}
    ports:
      - "8080:8080"
    volumes:
      - video_data:/app/data

  frontend:
    build: ./frontend
    container_name: museum-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
  minio_data:
  video_data:
  milvus_data:
  milvus_minio_data:
  etcd_data:
