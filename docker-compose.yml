services:
  mysql:
    image: mysql:8.0
    container_name: museum-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root123}
      MYSQL_DATABASE: museum_monitor
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: museum-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  backend:
    build: ./backend
    container_name: museum-backend
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SECRET_KEY: ${SECRET_KEY:-museum-monitor-secret-2026}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root123}
      MYSQL_DATABASE: museum_monitor
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      # ChromaDB 持久化目录
      CHROMA_PERSIST_DIR: /app/data/chromadb
      # 大模型 API（从 .env 读取）
      VLLM_TEXT_URL: ${VLLM_TEXT_URL:-https://api.openai.com/v1}
      VLLM_VISION_URL: ${VLLM_VISION_URL:-https://api.openai.com/v1}
      VLLM_TEXT_MODEL: ${VLLM_TEXT_MODEL:-gpt-4o}
      VLLM_VISION_MODEL: ${VLLM_VISION_MODEL:-gpt-4o}
      VLLM_API_KEY: ${VLLM_API_KEY:-not-needed}
      VLLM_VISION_API_KEY: ${VLLM_VISION_API_KEY:-}
      # 报警
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      ALERT_WEBHOOK_TYPE: ${ALERT_WEBHOOK_TYPE:-feishu}
    ports:
      - "8080:8080"
    volumes:
      - video_data:/app/data

  frontend:
    build: ./frontend
    container_name: museum-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
  minio_data:
  video_data:
